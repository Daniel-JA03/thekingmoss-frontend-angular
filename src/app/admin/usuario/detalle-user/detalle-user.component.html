<div class="modal fade" id="detalleUsuarioModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    @if (usuario) {
      <div class="modal-content shadow-lg border-0">

        <!-- HEADER -->
        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title">Detalle del Usuario</h5>
          <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>

        <!-- BODY -->
        <div class="modal-body">

          <div class="row g-3">

            <div class="col-md-6">
              <label class="label">Username</label>
              <div class="value">{{ usuario.username }}</div>
            </div>

            <div class="col-md-6">
              <label class="label">Email</label>
              <div class="value">{{ usuario.email }}</div>
            </div>

            <div class="col-md-6">
              <label class="label">Nombre</label>
              <div class="value">{{ usuario.nombreUsuario }}</div>
            </div>

            <div class="col-md-6">
              <label class="label">Apellido</label>
              <div class="value">{{ usuario.apellidoUsuario }}</div>
            </div>

            <div class="col-md-6">
              <label class="label">Teléfono</label>
              <div class="value">{{ usuario.telefono }}</div>
            </div>

            <div class="col-md-6">
                <label class="label">Estado</label>
                <div class="value">
                    <span
                    [ngClass]="{
                        'estado-badge': true,
                        'activo': !usuario.accountLocked,
                        'bloqueado': usuario.accountLocked
                    }"
                    >
                    <span class="badge-circle"></span>
                    {{ usuario.accountLocked ? 'Bloqueado' : 'Activo' }}
                    </span>
                </div>
            </div>

            <!-- <div class="col-12">
                <label class="label">Roles</label>
                <div class="value d-flex flex-wrap gap-2">

                    @for (rol of usuario.roles; track rol) {
                    <span
                        [ngClass]="{
                        'rol-badge': true,
                        'admin': rol === 'ROLE_ADMIN',
                        'user': rol === 'ROLE_USER'
                        }"
                    >
                        <span class="badge-circle"></span>
                        {{ rol }}
                    </span>
                    }

                </div>
            </div> -->

            <div class="col-12">
              <label class="label">Roles</label>
              <div class="value d-flex flex-wrap gap-2">

                @for (rol of usuario.roles; track rol) {
                  <span
                    class="rol-badge"
                    [ngClass]="getRolClass(rol)"
                  >
                    <i [class]="getRolIcon(rol)"></i>
                    {{ rol }}
                  </span>
                }

              </div>
            </div>

          </div>

        </div>

        <!-- FOOTER -->
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">
            Cerrar
          </button>
        </div>

      </div>
    }
  </div>
</div>
